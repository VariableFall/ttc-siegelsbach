name: Daten aktualisieren

on:
  schedule:
    - cron: '0 6,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daten-pipeline
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Daten abrufen
        run: node pipeline/fetch.mjs

      - name: Änderungen committen
        run: |
          if git diff --quiet -- public/data/; then
            echo "Keine Änderungen an den JSON-Dateien."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/tabellen.json public/data/spielplan.json
          DATUM=$(date -u +%d.%m.%Y)
          git commit -m "Daten aktualisiert ${DATUM}"
          git push
