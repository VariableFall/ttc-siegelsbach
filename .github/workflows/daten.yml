name: Daten aktualisieren

# ── PAUSIERT (unbestimmt) ────────────────────────────────────────────────
# Kein automatischer und kein manueller Abruf von mytischtennis.de.
# Die Website nutzt weiterhin die zuletzt eingecheckten JSON-Dateien.
#
# Reaktivieren, wenn du wieder live ziehen willst:
#   1. `if: false` am Job unten entfernen
#   2. schedule-Block einkommentieren (für Automatik, optional)
#   3. In deploy.yml den workflow_run-Trigger wieder einkommentieren
# ─────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 6,22 * * *'

permissions:
  contents: write

concurrency:
  group: daten-pipeline
  cancel-in-progress: false

jobs:
  fetch:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Daten abrufen
        run: node pipeline/fetch.mjs

      - name: Änderungen committen
        run: |
          if git diff --quiet -- public/data/; then
            echo "Keine Änderungen an den JSON-Dateien."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/tabellen.json public/data/spielplan.json
          DATUM=$(date -u +%d.%m.%Y)
          git commit -m "Daten aktualisiert ${DATUM}"
          git push
